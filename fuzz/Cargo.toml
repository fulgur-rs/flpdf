# Standalone fuzz crate for flpdf, generated by `cargo fuzz init` and relocated
# to the repository root so it is never bundled into the published `flpdf`
# crate. The empty `[workspace]` table below makes this its own workspace root,
# fully decoupled from the parent workspace: stable `cargo build/test/clippy
# --workspace` never compiles libfuzzer-sys, and `cargo fuzz` (nightly) builds
# this crate independently.
[package]
name = "flpdf-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[workspace]

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.flpdf]
path = "../crates/flpdf"

# Whole-document harness: open -> check -> write. A panic, abort, OOM, or hang
# on any input is a defect (the core guarantee is that arbitrary bytes never
# panic/abort and that traversal terminates).
[[bin]]
name = "roundtrip"
path = "fuzz_targets/roundtrip.rs"
test = false
doc = false
bench = false
