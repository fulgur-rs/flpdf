name: Release-plz

# Automates flpdf / flpdf-cli releases with release-plz:
#   - release-pr:  opens/updates a Release PR (version bump + Cargo.lock + CHANGELOG)
#   - release:     on the merged Release PR, publishes to crates.io, pushes the
#                  `vX.Y.Z` tag, and creates the GitHub Release (body from CHANGELOG)
#
# Approval model (two gates — see docs/RELEASE_SETUP.md):
#   ① Release PR content approval — the `release-pr-approval` required status
#      check (release-pr-approval-gate.yml + the main branch ruleset).
#   ② Release-execution approval — the `release` environment's required reviewers,
#      which also stamps the OIDC token for crates.io Trusted Publishing.
#
# crates.io auth is OIDC Trusted Publishing (rust-lang/crates-io-auth-action); no
# long-lived registry token is stored. Setup: docs/RELEASE_SETUP.md.

# Least privilege: default read-only, grant write only where a job needs it.
permissions:
  contents: read

on:
  push:
    branches:
      - main
  # Manual escape hatch if a real release wasn't detected from the push (e.g. the
  # Release PR was squash-merged with a hand-edited subject). A workflow_dispatch
  # run still pauses on the `release` environment approval before publishing.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The `release` job runs on EVERY push to main but only publishes when a Release
  # PR was just merged. Its `release` environment carries required reviewers (gate
  # ②), and an environment gate pauses a job the moment it becomes eligible — so
  # without a guard, every ordinary merge to main would sit waiting for a release
  # approval. This job detects whether the push is a real release; the `release`
  # job is `if:`-gated on the result, so the approval prompt appears on real
  # releases alone.
  check-releases:
    name: Detect a real release
    runs-on: ubuntu-latest
    outputs:
      has_releases: ${{ steps.check.outputs.has_releases }}
    steps:
      - name: Determine whether this push is an actual release
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
          COMMIT_MSGS: ${{ toJSON(github.event.commits.*.message) }}
        run: |
          set -euo pipefail
          emit() { echo "has_releases=$1" >> "$GITHUB_OUTPUT"; echo "has_releases=$1 ($2)"; }

          # Real releases live on main only. This check MUST precede the
          # workflow_dispatch hatch: a manual run can be dispatched from any
          # branch/tag, and publishing from a non-main ref would bypass the
          # Release PR (①) gate and the main-branch ruleset.
          if [ "$REF" != "refs/heads/main" ]; then emit false "not main"; exit 0; fi

          # Manual escape hatch (main only) — still gated by the release env approval.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then emit true "workflow_dispatch"; exit 0; fi

          # Merge-commit path: the Release PR head branch is `release-plz-<date>`,
          # which appears in the default "Merge pull request …" commit subject.
          HEAD_SUBJECT="${HEAD_MSG%%$'\n'*}"
          if printf '%s\n' "$HEAD_SUBJECT" | grep -qE 'release-plz-[0-9]{4}-[0-9]{2}-[0-9]{2}'; then
            emit true "release-plz merge commit"; exit 0
          fi

          # Merge-method-agnostic path: release-plz always creates a
          # `chore: release …` commit for a real release. It is in the push
          # whether the Release PR was merge-committed (as an inner commit) or
          # squash-merged (as the squash commit itself), so scan EVERY pushed
          # commit subject.
          #
          # Subject shape depends on whether all released packages share one
          # version: with a single common version release-plz emits
          # `chore: release vX.Y.Z` (observed on the version_group sibling repo);
          # with differing per-crate versions it emits a bare `chore: release`
          # (observed on the decoupled sibling repo). flpdf is a lockstep
          # single-version workspace, so it takes the versioned form — but accept
          # BOTH shapes for robustness. Anchor to end-of-line or ` vN` so an
          # ordinary subject like `chore: release docs` doesn't false-positive and
          # pause an unrelated merge on the release approval.
          if printf '%s' "$COMMIT_MSGS" | jq -r '.[]? | split("\n")[0]' \
               | grep -qE '^chore: release( v[0-9]|$)'; then
            emit true "chore: release commit in push"; exit 0
          fi

          emit false "no release markers"

  release-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the Release PR branch
      pull-requests: write   # create/update the Release PR
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      # Create the Release PR as the release App, NOT the default GITHUB_TOKEN. A
      # PR authored via GITHUB_TOKEN does not fire other workflows, so ci.yml
      # would never run on the Release PR and every release would need CI kicked
      # off by hand. Requires the App to have Pull requests + Contents: R/W.
      - name: Generate App token for the Release PR
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          # Scope to what release-pr needs: create/update the Release PR
          # (pull-requests) and advance its branch via the API (contents).
          # workflows too: the release branch can be advanced across a commit that
          # touched .github/workflows/*, which GitHub rejects for App ref updates
          # without it.
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          # release-plz pushes the PR branch via the GitHub API (auth'd by the App
          # token in its env), so don't persist a token in git config.
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: release-plz
          save-if: false

      - name: Run release-plz release-pr
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7  # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  release:
    name: Release-plz release
    needs: [release-pr, check-releases]
    # Only run — and thus only hit the `release` approval gate — on an actual
    # release. See check-releases above (this is what keeps ordinary merges to
    # main from pausing on a release approval).
    if: needs.check-releases.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    # Serialize publishing so a main push landing while a release is in flight
    # can't start a second `release-plz release` from a newer SHA and race the
    # first for the same version. Queued runs are harmless: release-plz skips a
    # version already published to crates.io.
    concurrency:
      group: release-plz-publish
      cancel-in-progress: false
    # `environment: release` does double duty:
    #   1. Release-execution approval gate (②): required reviewers must approve
    #      before crates.io publish + tag creation.
    #   2. Stamps the OIDC token with `environment:release` so it matches the
    #      crates.io Trusted Publisher (registered with Environment = release).
    environment: release
    permissions:
      contents: write
      id-token: write  # required by rust-lang/crates-io-auth-action (OIDC)
    steps:
      # release-plz creates the `vX.Y.Z` tag + GitHub Release via the GitHub API
      # using the token passed below as GITHUB_TOKEN. Use the App token (not
      # GITHUB_TOKEN) so those events are App-authored and can fire follow-up
      # workflows (e.g. a future binaries workflow on release:published).
      - name: Generate App token for tag/release push
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          # Scope to what `release-plz release` needs: create the tag + GH Release
          # (contents) and read associated PRs for contributors (pull-requests).
          # workflows too: a release tag can point at a commit that touched
          # .github/workflows/*.
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: release-plz
          save-if: false

      # crates.io Trusted Publishing: present the OIDC claim (repo + workflow +
      # environment) to crates.io and get a short-lived token back. No PAT stored.
      - name: Authenticate to crates.io
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18  # v1.0.5

      - name: Run release-plz release
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7  # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
