name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }}${{ matrix.coverage && ' cov' || '' }})
    needs: quality
    # id-token: write is required by the coverage cell's Codecov OIDC upload.
    # Job-level permissions fully replace the workflow-level set (they do not
    # merge), so contents: read must be restated here.
    permissions:
      contents: read
      id-token: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Platform parity with fulgur's `test` matrix so flpdf surfaces the
      # same cross-arch / cross-OS behaviour ahead of fulgur integration.
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            coverage: false
            cache-key: ubuntu-latest-flpdf
          - os: ubuntu-latest
            arch: amd64
            coverage: true
            cache-key: ubuntu-latest-flpdf-cov
          - os: ubuntu-24.04-arm
            arch: arm64
            coverage: false
            cache-key: ubuntu-24.04-arm-flpdf
          - os: macos-latest
            arch: arm64
            coverage: false
            cache-key: macos-latest-flpdf
          - os: windows-latest
            arch: amd64
            coverage: false
            cache-key: windows-latest-flpdf

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: ${{ matrix.cache-key }}

      - name: Install cargo-llvm-cov
        if: matrix.coverage
        uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # cargo-llvm-cov

      # qpdf is required by crates/flpdf-cli/tests/cli_linearize_qpdf.rs as
      # an external oracle.  Install it on Linux (apt — covers both amd64 and
      # the ubuntu-24.04-arm runner) so the oracle suite hard-fails on missing
      # qpdf (skip_if_qpdf_missing).
      #
      # On Windows AND macOS we deliberately do NOT install qpdf: both the
      # choco (Windows) and Homebrew (macOS) packages surface the same
      # unrelated qpdf runtime error on existing writer_tests output
      # (vector::_M_range_check) — empirically reproduced on macos-latest via
      # brew — tracked separately in flpdf-d4k.  The qpdf-dependent tests
      # therefore skip silently on Windows/macOS runners (is_qpdf_available()
      # == false) and the qpdf oracle gate only fires on Linux.
      - name: Install qpdf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qpdf

      - name: Run tests in required order
        if: ${{ !matrix.coverage }}
        shell: bash
        run: |
          set -euo pipefail

          echo "[ci] cargo test -p flpdf --test reader_tests"
          cargo test -p flpdf --test reader_tests

          echo "[ci] cargo test -p flpdf --test xref_tests"
          cargo test -p flpdf --test xref_tests

          echo "[ci] cargo test -p flpdf --test check_tests"
          cargo test -p flpdf --test check_tests

          echo "[ci] cargo test -p flpdf --test writer_tests"
          cargo test -p flpdf --test writer_tests

          echo "[ci] cargo test -p flpdf-cli --test cli_tests"
          cargo test -p flpdf-cli --test cli_tests

          echo "[ci] cargo test -p flpdf-cli --test compat_matrix_tests"
          cargo test -p flpdf-cli --test compat_matrix_tests

          echo "[ci] cargo test -p flpdf"
          cargo test -p flpdf

          echo "[ci] cargo test"
          cargo test

      # The coverage cell measures coverage instead of running the strict
      # ordered script (the ordering is for log readability + oracle hard-
      # fail surfacing, not inter-test state); the amd64 non-coverage Linux
      # cell remains the authoritative correctness gate.
      - name: Run tests with coverage
        if: matrix.coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage artifact
        if: matrix.coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          use_oidc: true
          fail_ci_if_error: false

      # amd64-Linux-only: the captured reference bytes match the amd64 Ubuntu
      # base image's zlib1g version; Windows (libz-sys vendored zlib),
      # ubuntu-24.04-arm (different arch base image) and macOS would produce
      # spurious diffs.  Skipped on the coverage cell to avoid a duplicate
      # amd64-Linux run.
      - name: bytes-identical zlib compat (Linux amd64)
        if: ${{ runner.os == 'Linux' && matrix.arch == 'amd64' && !matrix.coverage }}
        run: cargo test -p flpdf --features qpdf-zlib-compat --test zlib_compat_tests

      - name: Compat matrix baselines (Linux amd64)
        if: ${{ runner.os == 'Linux' && matrix.arch == 'amd64' && !matrix.coverage }}
        shell: bash
        run: |
          set -euo pipefail
          echo "[ci] Running compat matrix baselines — drift surfaces here as an explicit step"
          cargo test -p flpdf-cli --test compat_baseline_static_id -- --nocapture
          cargo test -p flpdf-cli --test compat_matrix_baseline -- --nocapture
