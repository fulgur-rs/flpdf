name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # flpdf is published to docs.rs, so broken intra-doc links are a quality
      # regression. --document-private-items is required: these breaks can live
      # entirely on pub(crate)/private items while the public docs.rs build
      # stays clean, so without it the gate misses private-only rot. Named
      # rustdoc lints (not `-D warnings`) keep the gate stable across stable-
      # toolchain bumps — same rationale as the fuzz job pinning its nightly.
      - name: Doc links
        run: RUSTDOCFLAGS="-D rustdoc::broken_intra_doc_links -D rustdoc::private_intra_doc_links -D rustdoc::invalid_html_tags" cargo doc --workspace --no-deps --document-private-items

  test:
    name: Test (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Platform parity with fulgur's `test` matrix so flpdf surfaces the
      # same cross-arch / cross-OS behaviour ahead of fulgur integration.
      # Coverage lives in its own `coverage` job (below) so the elevated
      # id-token: write permission Codecov OIDC needs stays off these
      # cross-platform cells (the job inherits workflow contents: read only).
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            cache-key: ubuntu-latest-flpdf
          - os: ubuntu-24.04-arm
            arch: arm64
            cache-key: ubuntu-24.04-arm-flpdf
          - os: macos-latest
            arch: arm64
            cache-key: macos-latest-flpdf
          - os: windows-latest
            arch: amd64
            cache-key: windows-latest-flpdf

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: ${{ matrix.cache-key }}

      # qpdf is an external oracle for the cross-check suites (cli_linearize_qpdf,
      # cli_qdf*, cli_object_streams_qpdf_parity, writer_tests, ...). Install it
      # on every runner so those suites hard-fail when qpdf is missing rather
      # than silently skipping (skip_if_qpdf_missing).
      #
      # qpdf 12.x (choco on Windows, Homebrew on macOS) aborts `qpdf --check`
      # on a zero-page PDF with an upstream `std::vector::at()` crash
      # (`ERROR: vector...`); the apt qpdf 11.x on Linux does not. The few
      # tests that `qpdf --check` a zero-page fixture detect that crash by its
      # stderr signature and skip just that gate (flpdf-d4k) — so qpdf can be
      # installed on all runners without the upstream bug breaking CI.
      - name: Install qpdf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qpdf

      - name: Install qpdf (macOS)
        if: runner.os == 'macOS'
        run: brew install qpdf

      - name: Install qpdf (Windows)
        if: runner.os == 'Windows'
        run: choco install qpdf -y --no-progress

      - name: Run tests in required order
        shell: bash
        run: |
          set -euo pipefail

          echo "[ci] cargo test -p flpdf --test reader_tests"
          cargo test -p flpdf --test reader_tests

          echo "[ci] cargo test -p flpdf --test xref_tests"
          cargo test -p flpdf --test xref_tests

          echo "[ci] cargo test -p flpdf --test check_tests"
          cargo test -p flpdf --test check_tests

          echo "[ci] cargo test -p flpdf --test writer_tests"
          cargo test -p flpdf --test writer_tests

          echo "[ci] cargo test -p flpdf-cli --test cli_tests"
          cargo test -p flpdf-cli --test cli_tests

          echo "[ci] cargo test -p flpdf-cli --test compat_matrix_tests"
          cargo test -p flpdf-cli --test compat_matrix_tests

          echo "[ci] cargo test -p flpdf"
          cargo test -p flpdf

          echo "[ci] cargo test"
          cargo test

      # amd64-Linux-only: the captured reference bytes match the amd64 Ubuntu
      # base image's zlib1g version; Windows (libz-sys vendored zlib),
      # ubuntu-24.04-arm (different arch base image) and macOS would produce
      # spurious diffs.
      - name: bytes-identical zlib compat (Linux amd64)
        if: ${{ runner.os == 'Linux' && matrix.arch == 'amd64' }}
        run: |
          set -euo pipefail
          # Pins flate2's deflate backend to classic libz.
          cargo test -p flpdf --features qpdf-zlib-compat --test zlib_compat_tests
          # Demonstrates plain --static-id rewrite is cmp-diff-0 vs qpdf golden.
          cargo test -p flpdf --features qpdf-zlib-compat --test cmp_diff_zero_tests
          # Pins linearized output structural byte-parity vs qpdf golden
          # (everything except the qpdf-internal /ID[1]; see flpdf-wb76).
          cargo test -p flpdf --features qpdf-zlib-compat --test cmp_linearize_tests
          # Pins linearized --object-streams=generate byte-parity vs qpdf goldens
          # (structural + strict, incl. the in_open_document openaction oracles
          # and the multi-container OD ordering discriminator flpdf-699x).
          cargo test -p flpdf --features qpdf-zlib-compat --test cmp_linearize_objstm_tests
          # Pins overlay/underlay output byte-identity vs committed qpdf goldens.
          # These gates live in lib unit tests (overlay::byte_gate) behind the
          # qpdf-zlib-compat cfg, so they must be run explicitly with --lib.
          cargo test -p flpdf --features qpdf-zlib-compat --lib overlay::byte_gate
          # Pins the CLI binary's linearized output byte-identity vs qpdf goldens
          # end-to-end (argument parsing -> WriteOptions -> write path -> framing).
          # Gated behind qpdf-zlib-compat, so it is compiled out of the default
          # test workflow and must be run explicitly here.
          cargo test -p flpdf-cli --features qpdf-zlib-compat --test cli_byte_identical

      - name: Compat matrix baselines (Linux amd64)
        if: ${{ runner.os == 'Linux' && matrix.arch == 'amd64' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "[ci] Running compat matrix baselines — drift surfaces here as an explicit step"
          cargo test -p flpdf-cli --test compat_baseline_static_id -- --nocapture
          cargo test -p flpdf-cli --test compat_matrix_baseline -- --nocapture

  coverage:
    name: Coverage
    needs: quality
    runs-on: ubuntu-latest
    # Codecov OIDC upload needs id-token: write.  Isolating coverage in its
    # own single-runner job keeps that elevated permission off the cross-
    # platform `test` matrix cells (least privilege).  Job-level permissions
    # fully replace the workflow-level set, so contents: read is restated.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: ubuntu-latest-flpdf-cov

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # cargo-llvm-cov

      # qpdf oracle hard-fails on Linux CI when missing (skip_if_qpdf_missing),
      # and cargo llvm-cov --workspace exercises those suites — install it.
      - name: Install qpdf
        run: sudo apt-get update && sudo apt-get install -y qpdf

      # Coverage measures the workspace once; the strict ordered script in the
      # `test` job remains the authoritative correctness gate.
      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          use_oidc: true
          fail_ci_if_error: false

  fuzz:
    name: Fuzz (short)
    needs: quality
    runs-on: ubuntu-latest
    # Backstop in case `cargo fuzz build` hangs or -max_total_time is not
    # honored; the run itself should finish in a few minutes (build + 60s).
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # cargo-fuzz needs nightly (libFuzzer / -Zsanitizer=address). Pin a known-
      # good nightly rather than floating `nightly` so a bad nightly can't break
      # unrelated PRs through this blocking gate.
      - name: Set up Rust (pinned nightly)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: nightly-2026-05-24
          components: rust-src

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: ubuntu-latest-flpdf-fuzz
          workspaces: fuzz

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # cargo-fuzz
        with:
          tool: cargo-fuzz

      # Short whole-document fuzz. -timeout=10 makes the "traversal terminates"
      # guarantee testable (libFuzzer's default per-input timeout is 1200s, which
      # would let a single hang silently eat the whole time budget). A crash,
      # abort, OOM, or hang writes an artifact and exits non-zero, failing CI.
      #
      # --target is pinned to the gnu triple: cargo-fuzz defaults its build
      # target to the triple it was itself compiled for, and cargo-binstall
      # fetches the musl build of cargo-fuzz, which would otherwise build for
      # musl. musl is statically-linked libc (incompatible with
      # -Zsanitizer=address) and its std/ASan runtime isn't installed. The gnu
      # target ships the prebuilt sanitizer runtime with the host nightly.
      - name: Short fuzz (roundtrip, 60s)
        run: |
          set -euo pipefail
          mkdir -p fuzz/corpus/roundtrip
          cargo fuzz run --target x86_64-unknown-linux-gnu roundtrip \
            fuzz/corpus/roundtrip fuzz/seeds/roundtrip \
            -- -max_total_time=60 -timeout=10 -rss_limit_mb=2048
