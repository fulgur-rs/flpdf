name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      # qpdf is required by crates/flpdf-cli/tests/cli_linearize_qpdf.rs as
      # an external oracle.  Install it on Linux so the oracle suite hard-
      # fails on missing qpdf (skip_if_qpdf_missing).
      #
      # On Windows we deliberately do NOT install qpdf at the moment: the
      # choco package surfaces an unrelated qpdf runtime error on existing
      # writer_tests output (vector::_M_range_check) that is tracked
      # separately.  The qpdf-dependent tests therefore skip silently on
      # Windows runners and CI panic only fires on Linux.
      - name: Install qpdf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y qpdf

      - name: Run tests in required order
        shell: bash
        run: |
          set -euo pipefail

          echo "[ci] cargo test -p flpdf --test reader_tests"
          cargo test -p flpdf --test reader_tests

          echo "[ci] cargo test -p flpdf --test xref_tests"
          cargo test -p flpdf --test xref_tests

          echo "[ci] cargo test -p flpdf --test check_tests"
          cargo test -p flpdf --test check_tests

          echo "[ci] cargo test -p flpdf --test writer_tests"
          cargo test -p flpdf --test writer_tests

          echo "[ci] cargo test -p flpdf-cli --test cli_tests"
          cargo test -p flpdf-cli --test cli_tests

          echo "[ci] cargo test -p flpdf-cli --test compat_matrix_tests"
          cargo test -p flpdf-cli --test compat_matrix_tests

          echo "[ci] cargo test -p flpdf"
          cargo test -p flpdf

          echo "[ci] cargo test"
          cargo test

      # Linux-only: the captured reference bytes match the Ubuntu base image's
      # zlib1g version; libz-sys vendored zlib on Windows tracks a different
      # upstream and would produce a spurious diff.
      - name: bytes-identical zlib compat (Linux)
        if: runner.os == 'Linux'
        run: cargo test -p flpdf --features qpdf-zlib-compat --test zlib_compat_tests

      - name: Compat matrix baselines (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "[ci] Running compat matrix baselines — drift surfaces here as an explicit step"
          cargo test -p flpdf-cli --test compat_baseline_static_id -- --nocapture
          cargo test -p flpdf-cli --test compat_matrix_baseline -- --nocapture

  publish-dry-run:
    name: Publish dry-run (flpdf)
    needs: quality
    runs-on: ubuntu-latest
    # flpdf-cli は flpdf がまだ crates.io に未 publish のため
    # cargo publish --dry-run できない（version not found）。
    # crates.io 上で flpdf が利用可能になった後に別途 cargo publish --dry-run -p flpdf-cli を CI に追加する。
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Clean stale package artifacts
        run: rm -rf target/package

      - name: cargo publish --dry-run -p flpdf
        run: cargo publish --dry-run -p flpdf

      - name: Verify packaged .crate contains README and LICENSE files
        shell: bash
        run: |
          set -euo pipefail
          # cargo publish --dry-run writes the .crate under target/package/tmp-crate/
          # (not directly under target/package/). Match both locations to stay
          # robust against future cargo changes.
          CRATE_FILE=$(find target/package -name 'flpdf-*.crate' -print -quit)
          if [ -z "$CRATE_FILE" ]; then
            echo "ERROR: no .crate file found under target/package"
            find target/package -maxdepth 3 -type f -print || true
            exit 1
          fi
          contents=$(tar tzf "$CRATE_FILE")
          # Derive the exact in-archive directory (e.g. flpdf-0.1.0) so we can
          # use grep -F for literal-string matching. Avoids the "." in
          # "README.md" being interpreted as any-char by regex.
          PKG_DIR=$(basename "$CRATE_FILE" .crate)
          for required in README.md LICENSE-APACHE LICENSE-MIT; do
            if ! printf '%s\n' "$contents" | grep -Fxq "${PKG_DIR}/${required}"; then
              echo "ERROR: missing $required in $CRATE_FILE"
              echo "$contents"
              exit 1
            fi
          done
          echo "OK: README.md / LICENSE-APACHE / LICENSE-MIT present in $CRATE_FILE"
