name: PR Labeler

# Derive a `release-notes:*` label from the PR title's conventional-commit
# prefix. The label is consumed by `.github/release.yml` when GitHub generates
# release notes (see release-prepare.yml's generate-notes step). Auto-labeling
# keeps the categorized changelog in sync with the commit convention without
# manual label upkeep.

on:
  pull_request_target:
    # `reopened` is included so a title edited while the PR was closed (which the
    # open-state guard skips) gets reconciled when the PR becomes open again.
    types: [opened, edited, reopened]

permissions:
  pull-requests: write
  contents: read

# Serialize runs per PR so a slow `opened` run can't finish after a later
# `edited` run and re-apply a label derived from the stale title. Cancel the
# in-flight run; the survivor reconciles to the current title's label.
concurrency:
  group: pr-labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    if: github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const titleChanged = !!context.payload.changes?.title;

            // On `edited`, only act when the title actually changed.
            // This preserves manual label overrides applied via the UI:
            // editing a label or PR body alone won't reclassify the PR.
            if (action === 'edited' && !titleChanged) {
              core.info(`PR #${pr.number}: edited without title change, skipping.`);
              return;
            }

            const title = pr.title || '';
            const labels = pr.labels.map(l => l.name);
            const existing = labels.filter(l => l.startsWith('release-notes:'));

            // `release:` PRs are managed manually; never touch their labels.
            if (/^release:/i.test(title)) {
              core.info(`PR #${pr.number} has release: prefix, skipping.`);
              return;
            }

            // Dependabot PRs carry their release-notes:* label directly via
            // dependabot.yml `labels`, so leave them untouched. Skipping avoids
            // the reconcile loop stripping that label when a grouped-update PR
            // title is derived from the group identifier rather than a commit
            // prefix, and keeps this workflow from writing labels under the
            // restricted token a Dependabot-triggered run may receive.
            if (pr.user?.login === 'dependabot[bot]') {
              core.info(`PR #${pr.number} authored by Dependabot; label managed by dependabot.yml, skipping.`);
              return;
            }

            const map = {
              feat: 'release-notes:feature',
              fix: 'release-notes:fix',
              docs: 'release-notes:docs',
              chore: 'release-notes:internal',
              test: 'release-notes:internal',
              ci: 'release-notes:internal',
              refactor: 'release-notes:internal',
              style: 'release-notes:internal',
              build: 'release-notes:internal',
              perf: 'release-notes:internal',
            };

            // Classify. `desired` is null when the title has no conventional
            // prefix or an unmapped one (e.g. `revert:`, `deps:`).
            let desired = null;
            const m = title.match(/^([a-zA-Z]+)(?:\([^)]+\))?!?:/);
            if (m) {
              desired = map[m[1].toLowerCase()] ?? null;
            } else {
              core.info(`PR #${pr.number} has no conventional commits prefix: ${title}`);
            }

            // Reconcile to exactly `desired` (or no release-notes:* label when
            // desired is null). Removing stale labels even when desired is null
            // fixes the case where a title is corrected from a mapped prefix to
            // an unmapped one, which would otherwise leave the old category.
            const alreadyCorrect =
              existing.length === (desired ? 1 : 0) &&
              (!desired || existing[0] === desired);
            if (alreadyCorrect) {
              core.info(`PR #${pr.number} already reconciled (${desired ?? 'none'}), skipping.`);
              return;
            }

            if (desired && !existing.includes(desired)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [desired],
              });
              core.info(`Added ${desired} to PR #${pr.number}`);
            }

            for (const stale of existing) {
              if (stale === desired) continue;
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: stale,
                });
                core.info(`Removed stale ${stale} from PR #${pr.number}`);
              } catch (err) {
                if (err.status === 404) {
                  core.info(`Label ${stale} already absent on PR #${pr.number}`);
                } else {
                  throw err;
                }
              }
            }
