# Categorize GitHub's automatically generated release notes by the
# `release-notes:*` labels that .github/workflows/pr-labeler.yml derives from
# each merged PR's conventional-commit title. Consumed by the generate-notes
# step in .github/workflows/release-prepare.yml, whose output feeds BOTH the
# GitHub Release body and CHANGELOG.md.
#
# Schema reference:
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    authors:
      # The "release: vX.Y.Z" PR is opened by release-prepare.yml using the
      # workflow's GITHUB_TOKEN, so its author is github-actions[bot]. Excluding
      # it keeps each release's notes from self-referencing the prior release PR.
      #
      # NOTE: paired with the "*" catch-all below. The catch-all newly surfaces
      # otherwise-unmatched PRs, so without this exclude the release PR would
      # appear under "Other Changes". Do not remove one without the other.
      - github-actions[bot]
  categories:
    - title: Features
      labels:
        - release-notes:feature
    - title: Bug Fixes
      labels:
        - release-notes:fix
    - title: Documentation
      labels:
        - release-notes:docs
    - title: Internal
      labels:
        - release-notes:internal
    # Catch-all MUST stay last: GitHub places each PR in the first matching
    # category, and "*" matches everything not bucketed above (e.g.
    # pre-convention PRs carrying no release-notes:* label). Keeping it ensures
    # history regeneration doesn't silently drop those PRs.
    - title: Other Changes
      labels:
        - "*"
